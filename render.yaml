services:
  - type: web
    name: maxwell-brain
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VECTOR_DB
        value: qdrant
      - key: QDRANT_URL
        sync: false  # set manually — point to Qdrant Cloud
      - key: OPENAI_API_KEY
        sync: false  # set manually in dashboard
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: ADMIN_API_KEY
        sync: false
      - key: API_KEYS
        sync: false
