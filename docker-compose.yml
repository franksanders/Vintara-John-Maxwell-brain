services:
  app:
    image: localhost/maxwell-brain:dev
    build:
      context: .
      target: dev
    container_name: maxwell-brain-app
    working_dir: /app
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_ALT_MODEL: ${EMBEDDING_ALT_MODEL:-text-embedding-3-large}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-5}
      EMBEDDING_RETRY_BASE_MS: ${EMBEDDING_RETRY_BASE_MS:-200}
      EMBEDDING_GLOBAL_MIN_INTERVAL_MS: ${EMBEDDING_GLOBAL_MIN_INTERVAL_MS:-0}
      EMBEDDING_CACHE_PATH: /app/.cache/embeddings.json
      NPM_CONFIG_CACHE: /npm-cache
      VECTOR_DB: ${VECTOR_DB:-qdrant}
      VECTOR_COLLECTION: ${VECTOR_COLLECTION:-maxwell_knowledge}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      RETRIEVE_ALPHA: ${RETRIEVE_ALPHA:-0.7}
      RETRIEVE_BETA: ${RETRIEVE_BETA:-0.2}
      RETRIEVE_GAMMA: ${RETRIEVE_GAMMA:-0.1}
      RETRIEVAL_ENABLED: ${RETRIEVAL_ENABLED:-true}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_LAMBDA: ${RERANK_LAMBDA:-0.5}
      RERANK_TOPN: ${RERANK_TOPN:-25}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      API_KEYS: ${API_KEYS:-}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      HF_TTS_MODEL: ${HF_TTS_MODEL:-}
      HF_TTS_PARAMETERS: ${HF_TTS_PARAMETERS:-}
      HF_TTS_ENDPOINT: ${HF_TTS_ENDPOINT:-}
      CONVERSATION_STORE_PATH: /app/.cache/conversations.json
      AUTO_INGEST_DIR: ${AUTO_INGEST_DIR:-./data/transcripts}
      PERSONA_PATH: ${PERSONA_PATH:-./data/persona/john_persona_curated.md}
      PERSONA_SNIPPETS_ENABLED: ${PERSONA_SNIPPETS_ENABLED:-true}
      DATETIME_ENABLED: ${DATETIME_ENABLED:-true}
      WEATHER_ENABLED: ${WEATHER_ENABLED:-false}
      WEATHER_CACHE_MS: ${WEATHER_CACHE_MS:-900000}
    volumes:
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./data:/app/data:ro
      - npm-cache:/npm-cache
      - app-cache:/app/.cache
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  test:
    image: localhost/maxwell-brain:dev
    build:
      context: .
      target: dev
    profiles: ["tools"]
    working_dir: /app
    command: >
      sh -c "npm run build &&
      npm test"
    environment:
      NODE_ENV: test
      EMBEDDING_PROVIDER: local
      VECTOR_DB: memory
      RETRIEVAL_ENABLED: "true"
      NPM_CONFIG_CACHE: /npm-cache
      CONVERSATION_STORE_PATH: /app/.cache/conversations.json
      EMBEDDING_CACHE_PATH: /app/.cache/embeddings.json
      AUTO_INGEST_DIR: ""
      PERSONA_PATH: ./data/persona/john_persona_curated.md
      ADMIN_API_KEY: dev-admin-key
      API_KEYS: ""
    volumes:
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./jest.config.js:/app/jest.config.js:ro
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./public:/app/public:ro
      - ./data:/app/data:ro
      - npm-cache:/npm-cache
      - app-cache:/app/.cache

  app-prod:
    image: localhost/maxwell-brain:prod
    build:
      context: .
    container_name: maxwell-brain-app-prod
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_ALT_MODEL: ${EMBEDDING_ALT_MODEL:-text-embedding-3-large}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-5}
      EMBEDDING_RETRY_BASE_MS: ${EMBEDDING_RETRY_BASE_MS:-200}
      EMBEDDING_GLOBAL_MIN_INTERVAL_MS: ${EMBEDDING_GLOBAL_MIN_INTERVAL_MS:-0}
      EMBEDDING_CACHE_PATH: /app/.cache/embeddings.json
      VECTOR_DB: ${VECTOR_DB:-qdrant}
      VECTOR_COLLECTION: ${VECTOR_COLLECTION:-maxwell_knowledge}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      RETRIEVE_ALPHA: ${RETRIEVE_ALPHA:-0.7}
      RETRIEVE_BETA: ${RETRIEVE_BETA:-0.2}
      RETRIEVE_GAMMA: ${RETRIEVE_GAMMA:-0.1}
      RETRIEVAL_ENABLED: ${RETRIEVAL_ENABLED:-true}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_LAMBDA: ${RERANK_LAMBDA:-0.5}
      RERANK_TOPN: ${RERANK_TOPN:-25}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      API_KEYS: ${API_KEYS:-}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
      HF_TTS_MODEL: ${HF_TTS_MODEL:-}
      HF_TTS_PARAMETERS: ${HF_TTS_PARAMETERS:-}
      HF_TTS_ENDPOINT: ${HF_TTS_ENDPOINT:-}
      CONVERSATION_STORE_PATH: /app/.cache/conversations.json
      AUTO_INGEST_DIR: ${AUTO_INGEST_DIR:-./data/transcripts}
      PERSONA_PATH: ${PERSONA_PATH:-./data/persona/john_persona_curated.md}
      PERSONA_SNIPPETS_ENABLED: ${PERSONA_SNIPPETS_ENABLED:-true}
      DATETIME_ENABLED: ${DATETIME_ENABLED:-true}
      WEATHER_ENABLED: ${WEATHER_ENABLED:-false}
      WEATHER_CACHE_MS: ${WEATHER_CACHE_MS:-900000}
    volumes:
      - app-cache:/app/.cache
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: maxwell-brain-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  app-cache:
  npm-cache:
  qdrant-data:
